<p>Why? Higher intensity means faster ATP demand → glycolysis speeds up → pyruvate production outpaces PDH → lactate rises. Meanwhile, rising catecholamines and declining malonyl-CoA further suppress fat oxidation.</p>`,

<p>Resting muscle pH is ~7.0; during maximal exercise it can drop to ~6.5. This rising [H⁺] impairs cross-bridge cycling, inhibits PFK-1, and reduces Ca²⁺ sensitivity — contributing to fatigue. Maintaining pH within a narrow range is critical for enzyme function.</p>`,

// ── Build DOM ──
const container = document.getElementById('card-container');
const searchInput = document.getElementById('search');
const filterWrap = document.getElementById('cat-filters');
let activeCategory = 'all';
let expandedCard = null;

// Category filter buttons
const allBtn = makeFilterBtn('all', 'All');
filterWrap.appendChild(allBtn);
allBtn.classList.add('active');
CATEGORIES.forEach(c => filterWrap.appendChild(makeFilterBtn(c.id, c.name)));

function makeFilterBtn(id, label) {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.dataset.cat = id;
  btn.textContent = label;
  btn.addEventListener('click', () => {
    activeCategory = id;
    filterWrap.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  });
  return btn;
}

// Build category sections and cards
CATEGORIES.forEach(cat => {
  const section = document.createElement('div');
  section.className = 'category-section';
  section.dataset.cat = cat.id;

  const heading = document.createElement('h2');
  heading.className = 'category-title';
  heading.textContent = cat.name;
  section.appendChild(heading);

  CONCEPTS.filter(c => c.category === cat.id).forEach(concept => {
    const card = document.createElement('div');
    card.className = 'concept-card';
    card.dataset.searchText = `${concept.title} ${concept.summary} ${concept.detail}`.replace(/<[^>]*>/g, '').toLowerCase();
    card.dataset.cat = cat.id;

    // Header
    const header = document.createElement('div');
    header.className = 'card-header';

    const chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '▶';

    const title = document.createElement('span');
    title.className = 'card-title';
    title.textContent = concept.title;

    const summary = document.createElement('span');
    summary.className = 'card-summary';
    summary.textContent = concept.summary;

    header.appendChild(chevron);
    header.appendChild(title);
    header.appendChild(summary);

    // Detail
    const detail = document.createElement('div');
    detail.className = 'card-detail';

    const inner = document.createElement('div');
    inner.className = 'card-detail-inner';
    inner.innerHTML = concept.detail;

    // Module link pills
    if (concept.links && concept.links.length > 0) {
      const linksWrap = document.createElement('div');
      linksWrap.className = 'card-links';
      const lbl = document.createElement('span');
      lbl.className = 'label';
      lbl.textContent = 'See it in:';
      linksWrap.appendChild(lbl);
      concept.links.forEach(modName => {
        const pill = document.createElement('a');
        pill.className = 'module-pill';
        pill.textContent = modName;
        pill.href = MODULE_PATHS[modName] || '#';
        linksWrap.appendChild(pill);
      });
      inner.appendChild(linksWrap);
    }

    detail.appendChild(inner);
    card.appendChild(header);
    card.appendChild(detail);

    // Accordion toggle
    header.addEventListener('click', () => {
      if (expandedCard && expandedCard !== card) {
        expandedCard.classList.remove('expanded');
      }
      card.classList.toggle('expanded');
      expandedCard = card.classList.contains('expanded') ? card : null;
    });

    section.appendChild(card);
  });

  container.appendChild(section);
});

// ── Filtering ──
function applyFilters() {
  const query = searchInput.value.trim().toLowerCase();
  const sections = container.querySelectorAll('.category-section');

  sections.forEach(section => {
    const catMatch = activeCategory === 'all' || section.dataset.cat === activeCategory;
    let anyVisible = false;

    section.querySelectorAll('.concept-card').forEach(card => {
      const textMatch = !query || card.dataset.searchText.includes(query);
      const visible = catMatch && textMatch;
      card.classList.toggle('hidden', !visible);
      if (visible) anyVisible = true;
    });

    section.classList.toggle('hidden', !catMatch || !anyVisible);
  });
}

searchInput.addEventListener('input', applyFilters);

// ── Nav ──
initNav('metabolism-101');
</script>
